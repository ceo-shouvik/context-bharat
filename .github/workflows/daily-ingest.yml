name: Daily Documentation Re-index

on:
  schedule:
    - cron: "30 20 * * *"   # 2:00 AM IST (20:30 UTC)
  workflow_dispatch:
    inputs:
      library:
        description: "Specific library to re-index (leave empty for all)"
        required: false
      force:
        description: "Force re-index even if fresh"
        type: boolean
        default: false

jobs:
  reindex:
    name: Re-index Libraries
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Trigger re-index
        env:
          CONTEXTBHARAT_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          CONTEXTBHARAT_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -n "${{ github.event.inputs.library }}" ]; then
            python backend/scripts/ingest.py --library "${{ github.event.inputs.library }}" \
              ${{ github.event.inputs.force == 'true' && '--force' || '' }}
          else
            python backend/scripts/trigger_scheduled_ingestion.py
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "⚠️ Context Bharat: Daily re-index failed! Check GitHub Actions."}'
