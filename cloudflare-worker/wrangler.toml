name = "contextbharat-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Route custom subdomains through this worker
# Requires the zone_id for contextbharat.com in Cloudflare
# Set zone_id here or via CLOUDFLARE_ZONE_ID env var when deploying

# Uncomment and set your zone_id before deploying:
# zone_id = "YOUR_ZONE_ID"

routes = [
  { pattern = "api.contextbharat.com/*", zone_name = "contextbharat.com" },
  { pattern = "mcp.contextbharat.com/*", zone_name = "contextbharat.com" }
]
